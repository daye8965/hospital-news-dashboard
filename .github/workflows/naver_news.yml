name: 뉴스 수집 자동화

on:
  schedule:
    - cron: "0 21 * * *"
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests openpyxl

      - name: CSV 오염 데이터 정리
        run: python clean_csv.py

      - name: 뉴스 수집 (매일)
        if: github.event.schedule == '0 21 * * *' || github.event_name == 'workflow_dispatch'
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python naver_to_csv.py

      - name: 주간 보고서 생성 (매주 월요일)
        if: github.event.schedule == '0 0 * * 1'
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python generate_weekly_report.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "자동 수집 $(date +'%Y-%m-%d')"
          git push
