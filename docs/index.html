<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빅5 병원 뉴스 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--border:#e4e4e0;
  --text:#1a1a18;--muted:#6b6b67;--accent:#1a5fa8;--accent-bg:#eef4fb;
  --radius:8px;--font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;
  --c-asan:#1a5fa8;--c-samsung:#1a7a3c;--c-severance:#7b3fa0;
  --c-snuh:#c0392b;--c-smc:#d4780a;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* 헤더 */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.header-left h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.header-left p{font-size:11px;color:var(--muted);margin-top:1px}
#total-badge{font-family:var(--mono);font-size:11px;background:var(--accent-bg);color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:500}

/* 탭 */
.tab-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab-btn{font-family:var(--font);font-size:14px;font-weight:600;padding:14px 28px;border:none;border-bottom:3px solid transparent;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;margin-bottom:-1px;letter-spacing:-.2px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active[data-tab="ours"]{color:var(--c-asan);border-bottom-color:var(--c-asan)}
.tab-btn.active[data-tab="others"]{color:var(--c-samsung);border-bottom-color:var(--c-samsung)}
.tab-btn.active[data-tab="compare"]{color:var(--text);border-bottom-color:var(--text)}

/* 필터 바 */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{font-family:var(--font);font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent)}
#search-input{width:200px}
.filter-bar button{font-family:var(--font);font-size:13px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s}
.filter-bar button:hover{border-color:var(--accent);color:var(--accent)}
#result-count{font-size:12px;color:var(--muted);margin-left:auto;font-family:var(--mono)}

/* 패널 */
main{padding:20px 32px;max-width:1280px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* 통계 카드 */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-card .value{font-size:20px;font-weight:600;font-family:var(--mono)}

/* 테이블 */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--accent)}
thead th .si{margin-left:3px;opacity:.4}
thead th.sorted .si{opacity:1;color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--accent-bg)}
td{padding:10px 12px;vertical-align:top}
.td-date{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.td-tag{white-space:nowrap}
.td-title a{color:var(--text);text-decoration:none;font-weight:500;font-size:13px;line-height:1.5;display:block}
.td-title a:hover{color:var(--accent)}
.td-summary{font-size:12px;color:var(--muted);max-width:300px}
.td-media{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.td-link a{font-size:11px;color:var(--accent);text-decoration:none;font-family:var(--mono)}
.td-link a:hover{text-decoration:underline}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}

/* 타병원 탭 - 병원 선택 필터 */
.hospital-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.hosp-btn{font-family:var(--font);font-size:12px;font-weight:500;padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.hosp-btn:hover{border-color:currentColor}
.hosp-btn.active{color:#fff}

/* 비교 탭 */
.compare-section-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 0 12px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-card h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:260px}
.rank-bar-wrap{display:flex;align-items:center;gap:8px}
.rank-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.rank-pct{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:32px;text-align:right}

/* 페이지네이션 */
.pagination{display:flex;justify-content:center;gap:5px;margin-top:14px;flex-wrap:wrap}
.pagination button{font-family:var(--mono);font-size:12px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.pagination button:hover,.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination button:disabled{opacity:.35;cursor:default}

.notice{background:#fffbeb;border:1px solid #f0e68c;border-radius:var(--radius);padding:8px 14px;margin-bottom:14px;font-size:12px;color:#7a6500}

/* 엑셀 다운로드 버튼 */
.excel-btn{font-family:var(--font);font-size:13px;font-weight:500;padding:6px 14px;border:1.5px solid #1a7a3c;border-radius:var(--radius);background:#fff;color:#1a7a3c;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.excel-btn:hover{background:#1a7a3c;color:#fff}
.excel-btn:active{transform:scale(.97)}
.excel-btn svg{flex-shrink:0}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;width:90%;max-width:860px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h2{font-size:15px;font-weight:600}
.modal-close{font-size:20px;border:none;background:none;cursor:pointer;color:var(--muted);line-height:1;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1}
.modal-table table{width:100%;border-collapse:collapse;font-size:13px}
.modal-table thead th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.modal-table tbody tr{border-bottom:1px solid var(--border)}
.modal-table tbody tr:last-child{border-bottom:none}
.modal-table tbody tr:hover{background:var(--accent-bg)}
.modal-table td{padding:9px 10px;vertical-align:top;font-size:13px}
.cat-btn{cursor:pointer;transition:opacity .15s}
.cat-btn:hover{opacity:.75}

@media(max-width:768px){
  header,.filter-bar,main,.tab-nav{padding-left:16px;padding-right:16px}
  .td-summary{display:none}
  #search-input{width:140px}
  .chart-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 매체 드릴다운 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">기사 목록</h2>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-table" id="modal-table"></div>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <h1>빅5 병원 뉴스 대시보드</h1>
    <p id="last-updated">샘플 데이터 미리보기</p>
  </div>
  <span id="total-badge">—</span>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="ours"   onclick="switchTab('ours')">🏥 우리병원</button>
  <button class="tab-btn"        data-tab="others" onclick="switchTab('others')">🔍 타병원</button>
  <button class="tab-btn"        data-tab="compare"onclick="switchTab('compare')">📊 병원 비교</button>
</nav>

<div class="filter-bar" id="filter-bar">
  <input type="date" id="date-from">
  <span style="color:var(--muted);font-size:12px">~</span>
  <input type="date" id="date-to">
  <select id="keyword-filter"><option value="">전체 키워드</option></select>
  <input type="text" id="search-input" placeholder="제목 검색...">
  <button onclick="resetFilters()">초기화</button>
  <span id="result-count"></span>
  <button class="excel-btn" onclick="downloadExcel()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    주간 엑셀 다운로드
  </button>
</div>

<main>
  <!-- ① 우리병원 탭 -->
  <div id="panel-ours" class="tab-panel active">
    <div class="notice">📋 샘플 데이터 미리보기 — GitHub Pages 배포 후 실제 수집 데이터로 교체됩니다.</div>
    <div class="stats-row" id="stats-ours"></div>
    <div class="table-wrap" id="table-ours"></div>
    <div class="pagination" id="pag-ours"></div>
  </div>

  <!-- ② 타병원 탭 -->
  <div id="panel-others" class="tab-panel">
    <div class="notice">📋 샘플 데이터 미리보기 — GitHub Pages 배포 후 실제 수집 데이터로 교체됩니다.</div>
    <div class="hospital-filter" id="hosp-filter"></div>
    <div class="stats-row" id="stats-others"></div>
    <div class="table-wrap" id="table-others"></div>
    <div class="pagination" id="pag-others"></div>
  </div>

  <!-- ③ 비교 탭 -->
  <div id="panel-compare" class="tab-panel">
    <div class="notice">📋 샘플 데이터 기준 비교입니다. 실제 배포 후 자동 반영됩니다.</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600;color:var(--muted)">기간 설정</span>
      <input type="date" id="compare-date-from" style="font-family:var(--font);font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none">
      <span style="color:var(--muted);font-size:12px">~</span>
      <input type="date" id="compare-date-to" style="font-family:var(--font);font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none">
      <button onclick="applyCompareFilter()" style="font-family:var(--font);font-size:13px;padding:5px 12px;border:1px solid var(--accent);border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer">적용</button>
      <button onclick="resetCompareFilter()" style="font-family:var(--font);font-size:13px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--muted);cursor:pointer">초기화</button>
      <span id="compare-period-label" style="font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)"></span>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3>병원별 기사 건수</h3>
        <div class="chart-wrap"><canvas id="chart-bar"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>병원별 점유율</h3>
        <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:48px">순위</th>
          <th>병원</th>
          <th style="width:90px">기사 수</th>
          <th>점유율</th>
          <th>수집 키워드</th>
        </tr></thead>
        <tbody id="compare-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

function resolveMedia(mediaStr, urlStr) {
  // 이미 매핑된 한글 매체명이면 그대로
  if (mediaStr && /[가-힣]/.test(mediaStr)) return mediaStr;
  // URL이나 도메인 단편에서 추출
  const target = urlStr || mediaStr || '';
  if (!target) return mediaStr || '';
  try {

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^\uFEFF/, '').trim().replace(/^"|"$/g, ''));
  const parsed = lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur);
    const row = {};
    headers.forEach((h, i) => row[h] = (cols[i] || '').trim().replace(/^"|"$/g, ''));
    return row;
  }).filter(r => r['제목']);

  // ── 프론트엔드 중복 제거 ──────────────────────────────────────────────────
  const seenUrls   = new Set();
  const seenTitles = new Set();
  return parsed.filter(r => {
    const url  = r['언론사원문'] || r['네이버링크'] || '';
    const tk   = (r['제목'] || '').replace(/[^\w가-힣a-zA-Z0-9]/g, '').toLowerCase().slice(0, 30);

    if (url && seenUrls.has(url))     return false;
    if (tk  && seenTitles.has(tk))    return false;

    if (url) seenUrls.add(url);
    if (tk)  seenTitles.add(tk);
    return true;
  });
}

function buildHospFilter() {
  const wrap = document.getElementById('hosp-filter');
  wrap.innerHTML = `<button class="hosp-btn active" data-hk="all" onclick="selectHosp('all')" style="border-color:#888;color:#444">전체 타병원</button>`
    + OTHERS_KEYS.map(k => {
      const h = HOSPITALS[k];
      return `<button class="hosp-btn" data-hk="${k}" onclick="selectHosp('${k}')"
        style="border-color:${h.color};color:${h.color}">${h.label}</button>`;
    }).join('');
}

function selectHosp(key) {
  selectedHosp = key === 'all' ? null : key;
  document.querySelectorAll('.hosp-btn').forEach(b => {
    const active = b.dataset.hk === key;
    b.classList.toggle('active', active);
    if (active) b.style.background = key === 'all' ? '#444' : HOSPITALS[key]?.color || '#444';
    else b.style.background = '';
    if (active) b.style.color = '#fff';
    else b.style.color = key === 'all' ? '' : (HOSPITALS[b.dataset.hk]?.color || '');
  });
  updateKeywordOptions('others');
  othersPage = 1;
  renderOthers();
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-'+tab));
  document.getElementById('filter-bar').style.display = tab === 'compare' ? 'none' : 'flex';
  if (tab === 'ours')   { updateKeywordOptions('ours');   renderOurs(); }
  if (tab === 'others') { updateKeywordOptions('others'); renderOthers(); }
  if (tab === 'compare') renderCompare();
}

function updateKeywordOptions(tab) {
  const sel = document.getElementById('keyword-filter');
  let kws = [];
  if (tab === 'ours') {
    kws = HOSPITALS.asan.keywords;
  } else {
    const keys = selectedHosp ? [selectedHosp] : OTHERS_KEYS;
    kws = [...new Set(keys.flatMap(k => HOSPITALS[k].keywords))];
  }
  sel.innerHTML = '<option value="">전체 키워드</option>' + kws.map(k=>`<option>${k}</option>`).join('');

// ── 필터 값 가져오기 ──────────────────────────────────────────────────────────
function getFilters() {
  return {
    dateFrom: document.getElementById('date-from').value,
    dateTo:   document.getElementById('date-to').value,
    keyword:  document.getElementById('keyword-filter').value,
    search:   document.getElementById('search-input').value.toLowerCase(),
  };
}

const FE_EXCLUDE_KW = ['부고','부음','별세','타계','빈소','발인','영결식','추도사','모친상','부친상','장례식장','셀럽포토','돌싱'];
const FE_EXCLUDE_MEDIA = ['celuvmedia'];

function applyFilters(rows) {
  const {dateFrom,dateTo,keyword,search} = getFilters();
  return rows.filter(r => {
    if (r['검색어'] === '서울중앙병원') return false;
    const combined = (r['제목']||'') + (r['요약']||'');
    if (FE_EXCLUDE_KW.some(kw => combined.includes(kw))) return false;
    const url = (r['언론사원문']||r['네이버링크']||'').toLowerCase();
    if (FE_EXCLUDE_MEDIA.some(m => url.includes(m))) return false;
    if (dateFrom && r['날짜'] < dateFrom) return false;
    if (dateTo   && r['날짜'] > dateTo)   return false;
    if (keyword  && r['검색어'] !== keyword) return false;
    if (search   && !r['제목'].toLowerCase().includes(search)) return false;
    return true;
  });
}

// ── 비교 탭 렌더 ──────────────────────────────────────────────────────────────
function getCompareData() {
  const from = document.getElementById('compare-date-from').value;
  const to = document.getElementById('compare-date-to').value;
  let data = allData.filter(r => {
    const combined = (r['제목']||'') + (r['요약']||'');
    if (FE_EXCLUDE_KW.some(kw => combined.includes(kw))) return false;
    const url = (r['언론사원문']||r['네이버링크']||'').toLowerCase();
    if (FE_EXCLUDE_MEDIA.some(m => url.includes(m))) return false;
    if (from && r['날짜'] < from) return false;
    if (to && r['날짜'] > to) return false;
    return true;
  });
  const label = document.getElementById('compare-period-label');
  label.textContent = (from || to) ? `${from || '~'} ~ ${to || '~'} (${data.length}건)` : '';
  return data;
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function statCard(label, value, color) {
  return `<div class="stat-card"><div class="label">${label}</div><div class="value" style="color:${color}">${typeof value==='number'?value.toLocaleString():value}</div></div>`;
}

function sortRows(rows, state) {
  return [...rows].sort((a,b) => {
    let av = a[state.col]||'', bv = b[state.col]||'';
    // URL처럼 생긴 날짜값은 빈값으로 처리
    if (av.startsWith('http')) av = '';
    if (bv.startsWith('http')) bv = '';
    return state.asc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
}

function doSort(panelKey, col) {
  if (panelKey === 'ours') {
    if (oursSort.col===col) oursSort.asc=!oursSort.asc; else{oursSort.col=col;oursSort.asc=false;}
    oursPage=1; renderOurs();
  } else {
    if (othersSort.col===col) othersSort.asc=!othersSort.asc; else{othersSort.col=col;othersSort.asc=false;}
    othersPage=1; renderOthers();
  }
}

function renderPag(id, total_rows, page, key) {
  const total = Math.ceil(total_rows/PAGE_SIZE);
  const el = document.getElementById(id);
  if (total<=1){el.innerHTML='';return;}
  let html=`<button onclick="goPage('${key}',${page-1})" ${page===1?'disabled':''}>← 이전</button>`;
  const s=Math.max(1,page-2),e=Math.min(total,page+2);
  if(s>1) html+=`<button onclick="goPage('${key}',1)">1</button>${s>2?'<span style="align-self:center;color:var(--muted);padding:0 2px">…</span>':''}`;
  for(let i=s;i<=e;i++) html+=`<button onclick="goPage('${key}',${i})" class="${i===page?'active':''}">${i}</button>`;
  if(e<total) html+=`${e<total-1?'<span style="align-self:center;color:var(--muted);padding:0 2px">…</span>':''}<button onclick="goPage('${key}',${total})">${total}</button>`;
  html+=`<button onclick="goPage('${key}',${page+1})" ${page===total?'disabled':''}>다음 →</button>`;
  el.innerHTML=html;
}

function goPage(key, p) {
  const base = key==='ours' ? allData.filter(r=>r['병원그룹']==='아산')
    : allData.filter(r=>OTHERS_KEYS.map(k=>HOSPITALS[k].group).includes(r['병원그룹']));
  const total = Math.ceil(base.length/PAGE_SIZE);
  if(p<1||p>total) return;
  if(key==='ours'){oursPage=p;renderOurs();}
  else{othersPage=p;renderOthers();}
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetFilters() {
  ['date-from','date-to'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('keyword-filter').value='';
  document.getElementById('search-input').value='';
  if(currentTab==='ours'){oursPage=1;renderOurs();}
  else{othersPage=1;renderOthers();}
}

['date-from','date-to','keyword-filter'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => {
    if(currentTab==='ours'){oursPage=1;renderOurs();}
    else{othersPage=1;renderOthers();}
  }));
document.getElementById('search-input').addEventListener('input', () => {
  if(currentTab==='ours'){oursPage=1;renderOurs();}
  else{othersPage=1;renderOthers();}
});

// ── 엑셀 다운로드 ─────────────────────────────────────────────────────────────
function downloadExcel() {

  const COLS = ['날짜','매체','제목','링크','교수 소속','이름'];

  // 주간 범위 계산 (오늘 기준 최근 7일)
  const today = new Date();
  const weekAgo = new Date(today);
  weekAgo.setDate(today.getDate() - 7);
  const fmt = d => d.toISOString().slice(0,10);
  const weekLabel = `${fmt(weekAgo)}_${fmt(today)}`;

  // 날짜 필터 값이 있으면 그걸 우선 사용
  const dateFrom = document.getElementById('date-from').value || fmt(weekAgo);
  const dateTo   = document.getElementById('date-to').value   || fmt(today);

  // 병원별로 시트 생성
  Object.entries(HOSPITALS).forEach(([key, h]) => {
    const rows = allData.filter(r => {
      if (r['병원그룹'] !== h.group) return false;
      if (r['날짜'] < dateFrom || r['날짜'] > dateTo) return false;
      return true;
    }).sort((a,b) => b['발행일시'].localeCompare(a['발행일시']));

    const sheetData = [
      COLS,
      ...rows.map(r => [
        r['날짜']       || '',
        r['매체']       || '',
        r['제목']       || '',
        r['언론사원문'] || r['네이버링크'] || '',
        '',   // 교수 소속 (수동 입력)
        '',   // 이름 (수동 입력)
      ])
    ];

    const ws = XLSX.utils.aoa_to_sheet(sheetData);

    // 컬럼 너비 설정
    ws['!cols'] = [
      {wch:12},  // 날짜
      {wch:14},  // 매체
      {wch:55},  // 제목
      {wch:60},  // 링크
      {wch:16},  // 교수 소속
      {wch:10},  // 이름
    ];

    // 헤더 행 스타일 (배경색)
    const headerRange = XLSX.utils.decode_range(ws['!ref']);
    for (let C = headerRange.s.c; C <= headerRange.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
      if (cell) {
        cell.s = {
          font:    {bold:true, color:{rgb:'FFFFFF'}},
          fill:    {fgColor:{rgb: h.color.replace('#','')}},
          alignment: {horizontal:'center'},
        };
      }
    }

    // 시트명: 병원 레이블 (Excel 시트명 31자 제한)
    XLSX.utils.book_append_sheet(wb, ws, h.label.slice(0,31));
  });

  const fileName = `빅5병원_뉴스_${weekLabel}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

// ── 매체 드릴다운 모달 ────────────────────────────────────────────────────────
function openMediaModal(category) {
  const base = allData.filter(r => r['병원그룹'] === '아산');
  const CAT_COLOR = {
    '일간지':'#1a5fa8','경제지':'#1a7a3c','방송':'#7b3fa0',
    '통신사':'#555','의료전문지':'#c0392b','기타':'#888',
  };
  const color = CAT_COLOR[category] || '#888';

  const rows = base
    .filter(r => classifyMedia(r['매체']) === category)
    .sort((a,b) => (b['발행일시']||'').localeCompare(a['발행일시']||''));

  document.getElementById('modal-title').innerHTML =
    `<span style="display:inline-flex;align-items:center;gap:8px">
      <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>
      ${category} <span style="font-family:var(--mono);font-size:12px;font-weight:400;color:var(--muted);margin-left:4px">${rows.length}건</span>
    </span>`;

  document.getElementById('modal-table').innerHTML = rows.length === 0
    ? `<div style="text-align:center;padding:40px;color:var(--muted)">기사가 없습니다.</div>`
    : `<table>
        <thead><tr>
          <th style="width:100px">날짜</th>
          <th style="width:90px">매체</th>
          <th>제목</th>
          <th style="width:80px">교수명</th>
          <th style="width:60px">링크</th>
        </tr></thead>
        <tbody>${rows.map(r => {
          const link = r['언론사원문']||r['네이버링크']||'';
          const naver = r['네이버링크']||'';
          const prof = r['교수명']||'';
          const rawDate = r['발행일시']||r['날짜']||'';
          const displayDate = (rawDate && !rawDate.startsWith('http')) ? rawDate.slice(0,16) : '—';
          const media = resolveMedia(r['매체']||'', r['언론사원문']||r['네이버링크']||'');
          return `<tr>
            <td style="font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap">${displayDate}</td>
            <td style="font-size:12px;white-space:nowrap">${media}</td>
            <td>${link?`<a href="${link}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;font-size:13px;font-weight:500">${r['제목']}</a>`:r['제목']}</td>
            <td style="font-size:12px;color:#1a5fa8;font-weight:${prof?'600':'400'};white-space:nowrap">${prof||'—'}</td>
            <td>${naver?`<a href="${naver}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);font-family:var(--mono)">네이버</a>`:''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ESC 키로 닫기
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });

init();
</script>
</body>
</html>
